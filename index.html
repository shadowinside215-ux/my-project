<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Suppress benign WebSocket errors in AI Studio
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (event.reason.message?.includes('WebSocket') || event.reason.toString().includes('WebSocket'))) {
          event.preventDefault();
          event.stopPropagation();
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && event.message.includes('WebSocket')) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEN31 | Luxury Menswear</title>
    <script>
      // Mobile zoom-out to show more content at once
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=0.4, maximum-scale=1.0');
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
